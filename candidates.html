<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MCIU Candidates</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="tailwind.css">
</head>

<body class="bg-secondary min-h-screen">

<header class="bg-white shadow">
  <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
    <h1 class="font-bold text-lg">MCIU Voting Portal</h1>
    <a href="dashboard.html" class="text-primary text-sm">Back</a>
  </div>
</header>

<main class="max-w-7xl mx-auto px-6 py-10">

  <h2 id="pageTitle" class="text-2xl font-semibold mb-6"></h2>

  <div id="candidatesGrid" class="grid sm:grid-cols-2 md:grid-cols-3 gap-8"></div>

</main>

<!-- MODAL -->
<div id="voteModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center">
  <div class="bg-white rounded-xl p-6 max-w-sm w-full text-center">
    <p id="confirmText" class="mb-6 text-gray-700"></p>
    <div class="flex gap-4">
      <button onclick="closeModal()" class="w-full border py-2 rounded">Cancel</button>
      <button onclick="submitVote()" class="w-full bg-primary text-white py-2 rounded">Confirm</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, collection, getDocs, query, where, runTransaction, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDRcir81tJ3zPxys8MFL_3MNSHtLJJKWIo",
  authDomain: "mciuvoting.firebaseapp.com",
  projectId: "mciuvoting",
  storageBucket: "mciuvoting.firebasestorage.app",
  messagingSenderId: "545959480192",
  appId: "1:545959480192:web:f8444c81d7ab46459a8f65",
  measurementId: "G-P0FT8RQLN3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ================== BASIC SETUP ================== */

const params = new URLSearchParams(window.location.search);
const position = params.get('position');
if (!position) {
  window.location.href = 'dashboard.html';
}

function getInitials(name) {
  const parts = String(name || '')
    .trim()
    .split(/\s+/)
    .filter(Boolean);
  const first = parts[0]?.[0] ?? '';
  const last = parts.length > 1 ? parts[parts.length - 1]?.[0] ?? '' : '';
  return (first + last).toUpperCase() || 'U';
}

function hashToHue(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) hash = (hash * 31 + str.charCodeAt(i)) >>> 0;
  return hash % 360;
}

function avatarDataUri(name) {
  const initials = getInitials(name);
  const hue = hashToHue(String(name || 'User'));
  const bg = `hsl(${hue} 70% 45%)`;
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256"><rect width="256" height="256" rx="128" fill="${bg}"/><text x="50%" y="54%" dominant-baseline="middle" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="96" fill="#fff" font-weight="700">${initials}</text></svg>`;
  return `data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}`;
}

function normalizePosition(value) {
  return String(value || '').trim().toLowerCase().replace(/\s+/g, ' ');
}

const currentUser = JSON.parse(localStorage.getItem('currentUser')) || {};
if (!currentUser || !currentUser.matric) {
  window.location.href = 'login.html';
}

/* ================== LOAD CANDIDATES ================== */

document.getElementById('pageTitle').innerText = `Vote for ${position}`;

const grid = document.getElementById('candidatesGrid');
let selectedCandidateId = null;
let selectedCandidateName = null;
let candidates = [];

async function loadElectionAndCandidates() {
  const electionRef = doc(db, 'election', 'current');
  const electionSnap = await getDoc(electionRef);
  const election = electionSnap.exists() ? electionSnap.data() : null;

  if (!election || election.status !== 'active') {
    alert('Election is not active');
    window.location.href = 'dashboard.html';
    return;
  }

  const positions = Array.isArray(election.positions) ? election.positions : [];
  const validPosition = positions.some(p => String(p).toLowerCase() === String(position).toLowerCase());
  if (!validPosition) {
    alert('Invalid position');
    window.location.href = 'dashboard.html';
    return;
  }

  const positionKey = normalizePosition(position);
  const list = [];

  const byKey = query(collection(db, 'candidates'), where('positionKey', '==', positionKey));
  const snapByKey = await getDocs(byKey);
  snapByKey.forEach(d => {
    const c = d.data();
    list.push({
      id: d.id,
      name: c?.name || '',
      position: c?.position || position,
      image: c?.image || null,
      votes: c?.votes ?? 0
    });
  });

  if (!list.length) {
    const legacy = query(collection(db, 'candidates'), where('position', '==', position));
    const snapLegacy = await getDocs(legacy);
    snapLegacy.forEach(d => {
      const c = d.data();
      list.push({
        id: d.id,
        name: c?.name || '',
        position: c?.position || position,
        image: c?.image || null,
        votes: c?.votes ?? 0
      });
    });
  }

  list.sort((a, b) => a.name.localeCompare(b.name));
  candidates = list;

  grid.innerHTML = '';
  if (!candidates.length) {
    grid.innerHTML = `
      <div class="bg-white rounded-xl shadow p-6 md:col-span-3">
        <h3 class="font-semibold text-lg">No nominated candidates yet</h3>
        <p class="text-gray-600 mt-1">The admin has not added nominees for ${position}.</p>
        <a href="dashboard.html" class="inline-block mt-4 text-primary">Back to positions</a>
      </div>
    `;
    return;
  }
  candidates.forEach(candidate => {
    const card = document.createElement('div');
    card.className = 'bg-white rounded-xl shadow p-6 text-center';
    const image = candidate.image || avatarDataUri(candidate.name);

    card.innerHTML = `
      <img src="${image}" class="w-32 h-32 mx-auto rounded-full object-cover">
      <h3 class="mt-4 font-semibold">${candidate.name}</h3>
      <button class="mt-6 w-full bg-primary text-white py-2 rounded">
        Vote
      </button>
    `;

    card.querySelector('button').onclick = () => confirmVote(candidate.id);
    grid.appendChild(card);
  });
}

loadElectionAndCandidates().catch(() => {
  alert('Network error. Please refresh.');
});

/* ================== VOTING ================== */

function confirmVote(id) {
  selectedCandidateId = id;
  selectedCandidateName = candidates.find(c => c.id === id)?.name || '';
  document.getElementById('confirmText').innerText =
    `You are about to vote for this candidate as ${position}`;
  document.getElementById('voteModal').classList.remove('hidden');
  document.getElementById('voteModal').classList.add('flex');
}

window.closeModal = function () {
  document.getElementById('voteModal').classList.add('hidden');
  document.getElementById('voteModal').classList.remove('flex');
};

window.submitVote = function () {
  if (!selectedCandidateId) return;

  const matric = String(currentUser?.matric || '').trim().toUpperCase();
  if (!matric) {
    alert('Enter your matric number');
    window.location.href = 'login.html';
    return;
  }
  if (!matric.startsWith('NS')) {
    alert('Only Faculty of Natural & Applied Sciences students can vote. Matric number must start with NS');
    window.location.href = 'login.html';
    return;
  }

  (async () => {
    const positionKey = normalizePosition(position);
    const voteId = `${matric}_${positionKey}`;
    const voteRef = doc(db, 'votes', voteId);
    const legacyVoteId = `${matric}_${position}`;
    const legacyVoteRef = legacyVoteId === voteId ? null : doc(db, 'votes', legacyVoteId);
    const candidateRef = doc(db, 'candidates', selectedCandidateId);

    await runTransaction(db, async (tx) => {
      const existingVote = await tx.get(voteRef);
      if (existingVote.exists()) throw new Error('ALREADY_VOTED');
      if (legacyVoteRef) {
        const legacyExisting = await tx.get(legacyVoteRef);
        if (legacyExisting.exists()) throw new Error('ALREADY_VOTED');
      }

      const candidateSnap = await tx.get(candidateRef);
      if (!candidateSnap.exists()) throw new Error('CANDIDATE_MISSING');

      const currentVotes = candidateSnap.data()?.votes ?? 0;
      tx.update(candidateRef, { votes: currentVotes + 1 });
      tx.set(voteRef, {
        matric,
        position,
        positionKey,
        candidateId: selectedCandidateId,
        candidateName: selectedCandidateName,
        createdAt: serverTimestamp()
      });
    });

    window.location.href = 'dashboard.html';
  })().catch((err) => {
    if (String(err?.message || '') === 'ALREADY_VOTED') {
      alert('You already voted for this position');
      return;
    }
    alert('Could not submit vote. Please try again.');
  });
};
</script>

</body>
</html>
