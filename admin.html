<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MCIU Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="tailwind.css">
</head>

<body class="bg-secondary min-h-screen p-4 sm:p-6">

<div class="bg-white max-w-5xl mx-auto rounded-xl shadow p-4 sm:p-6">

<h1 class="text-2xl font-bold text-primary mb-4">Admin Dashboard</h1>

<div id="toast" class="hidden mb-4 rounded-lg px-4 py-3 text-sm"></div>

<p class="mb-4">
  Election Status:
  <span id="statusText" class="font-semibold"></span>
</p>

<div class="flex flex-col sm:flex-row sm:flex-wrap gap-3 mb-6">
  <button id="openBtn" class="bg-green-600 text-white px-4 py-2 rounded w-full sm:w-auto">Open Election</button>
  <button id="closeBtn" class="bg-red-600 text-white px-4 py-2 rounded w-full sm:w-auto">Close Election</button>
  <button id="resetBtn" class="bg-gray-700 text-white px-4 py-2 rounded w-full sm:w-auto">Reset Election</button>
</div>

<hr class="my-6">

<h2 class="text-xl font-semibold mb-4">Add Position</h2>

<div class="flex flex-col md:flex-row gap-4 mb-6">
  <input id="newPositionName" class="border p-2 rounded flex-1" placeholder="e.g. Treasurer">
  <button id="addPositionBtn" class="bg-primary text-white px-6 py-2 rounded">Add Position</button>
</div>

<hr class="my-6">

<h2 class="text-xl font-semibold mb-4">Add Candidate</h2>

<div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 mb-6">
  <input id="candName" class="border p-2 rounded w-full" placeholder="Candidate name">
  <select id="candPosition" class="border p-2 rounded w-full">
  </select>
  <input id="candImage" type="file" accept="image/*" class="border p-2 rounded w-full">
</div>

<button id="addCandidateBtn" onclick="addCandidate()" class="bg-primary text-white px-6 py-2 rounded w-full sm:w-auto">
  Add Candidate
</button>

<hr class="my-6">

<h2 class="text-xl font-semibold mb-4">Candidates</h2>
<div id="candidateList" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>

<hr class="my-6">

<h2 class="text-xl font-semibold mb-4">Vote Records</h2>
<div class="overflow-auto border rounded">
  <table class="w-full text-sm min-w-max">
    <thead class="bg-secondary text-left">
      <tr>
        <th class="p-3 whitespace-nowrap">Matric No</th>
        <th class="p-3 whitespace-nowrap">Position</th>
        <th class="p-3 whitespace-nowrap">Voted For</th>
      </tr>
    </thead>
    <tbody id="votesTableBody"></tbody>
  </table>
</div>

<hr class="my-6">

<h2 class="text-xl font-semibold mb-4">Registered Voters</h2>
<div class="overflow-auto border rounded">
  <table class="w-full text-sm min-w-max">
    <thead class="bg-secondary text-left">
      <tr>
        <th class="p-3 whitespace-nowrap">Matric No</th>
        <th class="p-3 whitespace-nowrap">Status</th>
        <th class="p-3 whitespace-nowrap">Completed At</th>
      </tr>
    </thead>
    <tbody id="votersTableBody"></tbody>
  </table>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyDRcir81tJ3zPxys8MFL_3MNSHtLJJKWIo",
  authDomain: "mciuvoting.firebaseapp.com",
  projectId: "mciuvoting",
  storageBucket: "mciuvoting.firebasestorage.app",
  messagingSenderId: "545959480192",
  appId: "1:545959480192:web:f8444c81d7ab46459a8f65",
  measurementId: "G-P0FT8RQLN3"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
// Use default Firestore network settings for stability

const currentUser = JSON.parse(localStorage.getItem('currentUser'));
if (!currentUser || currentUser.role !== 'admin') {
  alert('Admins only');
  window.location.href = 'login.html';
}

const defaultPositions = ['President', 'Vice President', 'Secretary General'];
const electionRef = db.collection('election').doc('current');
const statusText = document.getElementById('statusText');
let cachedPositions = defaultPositions;

const openBtn = document.getElementById('openBtn');
const closeBtn = document.getElementById('closeBtn');
const resetBtn = document.getElementById('resetBtn');
const newPositionName = document.getElementById('newPositionName');
const addPositionBtn = document.getElementById('addPositionBtn');
const candName = document.getElementById('candName');
const candPosition = document.getElementById('candPosition');
const candImage = document.getElementById('candImage');
const addCandidateBtn = document.getElementById('addCandidateBtn');
const toast = document.getElementById('toast');

function normalizePosition(value) {
  return String(value || '').trim().toLowerCase().replace(/\s+/g, ' ');
}

function normalizeCandidateName(value) {
  return String(value || '').trim().toLowerCase().replace(/\s+/g, ' ');
}

function showToast(message, type = 'success') {
  if (!toast) return;
  toast.classList.remove('hidden', 'bg-green-50', 'text-green-800', 'border', 'border-green-200', 'bg-red-50', 'text-red-800', 'border-red-200');
  if (type === 'error') {
    toast.classList.add('bg-red-50', 'text-red-800', 'border', 'border-red-200');
  } else {
    toast.classList.add('bg-green-50', 'text-green-800', 'border', 'border-green-200');
  }
  toast.textContent = message;
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => {
    toast.classList.add('hidden');
  }, 3500);
}

function setAddCandidateLoading(isLoading) {
  if (!addCandidateBtn) return;
  addCandidateBtn.disabled = isLoading;
  addCandidateBtn.classList.toggle('opacity-50', isLoading);
  addCandidateBtn.classList.toggle('pointer-events-none', isLoading);
  addCandidateBtn.textContent = isLoading ? 'Adding...' : 'Add Candidate';
}

function toBase64(file, cb){
  const r = new FileReader();
  r.onload = () => cb(r.result);
  r.readAsDataURL(file);
}

function getInitials(name) {
  const parts = String(name || '')
    .trim()
    .split(/\s+/)
    .filter(Boolean);
  const first = parts[0]?.[0] ?? '';
  const last = parts.length > 1 ? parts[parts.length - 1]?.[0] ?? '' : '';
  return (first + last).toUpperCase() || 'U';
}

function hashToHue(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) hash = (hash * 31 + str.charCodeAt(i)) >>> 0;
  return hash % 360;
}

function avatarDataUri(name) {
  const initials = getInitials(name);
  const hue = hashToHue(String(name || 'User'));
  const bg = `hsl(${hue} 70% 45%)`;
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256"><rect width="256" height="256" rx="128" fill="${bg}"/><text x="50%" y="54%" dominant-baseline="middle" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="96" fill="#fff" font-weight="700">${initials}</text></svg>`;
  return `data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}`;
}

function renderStatus(status) {
  statusText.innerText = status === 'active' ? 'ACTIVE' : 'CLOSED';
  statusText.className = status === 'active' ? 'text-green-600' : 'text-red-600';
}

function renderPositionOptions() {
  const select = document.getElementById('candPosition');
  const current = select.value;
  const positions = Array.isArray(cachedPositions) && cachedPositions.length ? cachedPositions : defaultPositions;
  const unique = Array.from(new Set(positions.map(p => String(p || '').trim()).filter(Boolean)));
  const hasCurrent = current && unique.includes(current);
  const optionsHtml = unique.length
    ? unique.map(p => `<option value="${p}">${p}</option>`).join('')
    : `<option value="" disabled selected>No positions available</option>`;
  select.innerHTML = optionsHtml;
  if (hasCurrent) {
    select.value = current;
  } else if (unique.length) {
    select.value = unique[0];
  }
}

async function ensureElectionDoc() {
  try {
    const snap = await electionRef.get();
    if (!snap.exists) {
      await electionRef.set({ status: 'closed', positions: defaultPositions }, { merge: true });
      cachedPositions = defaultPositions;
      renderStatus('closed');
      localStorage.setItem('electionStatus', 'closed');
      localStorage.setItem('positions', JSON.stringify(defaultPositions));
      return;
    }
    const d = snap.data() || {};
    const status = d.status === 'active' ? 'active' : 'closed';
    const positions = Array.isArray(d.positions) && d.positions.length ? d.positions : defaultPositions;
    cachedPositions = positions;
    renderStatus(status);
    localStorage.setItem('electionStatus', status);
    localStorage.setItem('positions', JSON.stringify(positions));
  } catch {
    const legacyStatus = localStorage.getItem('electionStatus');
    const status = legacyStatus === 'active' || legacyStatus === 'closed' ? legacyStatus : 'closed';
    let positions = defaultPositions;
    try {
      const stored = JSON.parse(localStorage.getItem('positions') || 'null');
      if (Array.isArray(stored) && stored.length) positions = stored;
    } catch {}
    cachedPositions = positions;
    renderStatus(status);
  }
}

openBtn.onclick = async () => {
  await electionRef.update({ status: 'active' });
  renderStatus('active');
  localStorage.setItem('electionStatus', 'active');
};

closeBtn.onclick = async () => {
  await electionRef.update({ status: 'closed' });
  renderStatus('closed');
  localStorage.setItem('electionStatus', 'closed');
};

resetBtn.onclick = () => {
  if (!confirm('Reset election?')) return;
  (async () => {
    const candidatesSnap = await db.collection('candidates').get();
    const deletes = [];
    candidatesSnap.forEach(s => deletes.push(db.collection('candidates').doc(s.id).delete()));
    await Promise.allSettled(deletes);

    const votesSnap = await db.collection('votes').get();
    const voteDeletes = [];
    votesSnap.forEach(s => voteDeletes.push(db.collection('votes').doc(s.id).delete()));
    await Promise.allSettled(voteDeletes);

    const votersSnap = await db.collection('voters').get();
    const voterDeletes = [];
    votersSnap.forEach(s => voterDeletes.push(db.collection('voters').doc(s.id).delete()));
    await Promise.allSettled(voterDeletes);

    await renderCandidates();
    await renderVoteRecords();
    await renderRegisteredVoters();
  })().catch(() => alert('Could not reset election'));
};

addPositionBtn.onclick = () => {
  const name = newPositionName.value.trim().replace(/\s+/g, ' ');
  if (!name) return alert('Enter position name');

  const exists = cachedPositions.some(p => p.toLowerCase() === name.toLowerCase());
  if (exists) return alert('Position already exists');

  (async () => {
    const updated = [...cachedPositions, name];
    try {
      await electionRef.set({ positions: updated }, { merge: true });
      cachedPositions = updated;
      showToast(`Position added: ${name}`);
    } catch {
      // Update UI locally so admin can proceed; Firestore can be retried later
      cachedPositions = updated;
      showToast(`Position added locally: ${name}. Network will sync later.`, 'error');
    }
    newPositionName.value = '';
    renderPositionOptions();
  })().catch(() => showToast('Could not add position. Please try again.', 'error'));
};

window.addCandidate = () => {
  setAddCandidateLoading(true);
  const name = candName.value.trim();
  const file = candImage.files?.[0];
  const position = candPosition.value;
  const positionKey = normalizePosition(position);
  const nameKey = normalizeCandidateName(name);

  if (!name) { alert('Enter candidate name'); setAddCandidateLoading(false); return; }
  if (!position) { alert('Select position'); setAddCandidateLoading(false); return; }
  if (!positionKey) { alert('Select position'); setAddCandidateLoading(false); return; }
  if (!nameKey) { alert('Enter candidate name'); setAddCandidateLoading(false); return; }

  const addWithImage = async (img) => {
    try {
      const existing = await db.collection('candidates').where('positionKey', '==', positionKey).get();
      let isDuplicate = false;
      existing.forEach(s => {
        const c = s.data() || {};
        const existingKey = normalizeCandidateName(c.nameKey || c.name);
        if (existingKey && existingKey === nameKey) isDuplicate = true;
      });
      if (isDuplicate) {
        showToast(`Candidate "${name}" already exists for ${position}.`, 'error');
        return;
      }

      await db.collection('candidates').add({
        name,
        nameKey,
        position,
        positionKey,
        image: img || avatarDataUri(name),
        votes: 0
      });
      candName.value = '';
      candImage.value = '';
      showToast(`Candidate added: ${name}`);
      await renderCandidates();
    } catch (e) {
      showToast('Could not add candidate. Please try again.', 'error');
    } finally {
      setAddCandidateLoading(false);
    }
  };

  if (file) {
    toBase64(file, (img) => addWithImage(img));
    return;
  }

  addWithImage(null);
};

window.deleteCandidate = (candidateDocId) => {
  (async () => {
    await db.collection('candidates').doc(candidateDocId).delete();
    await renderCandidates();
  })().catch(() => alert('Could not delete candidate'));
};

async function renderCandidates(){
  const list = document.getElementById('candidateList');
  list.innerHTML = '';

  const snap = await db.collection('candidates').get();
  const rows = [];
  snap.forEach(s => {
    const c = s.data() || {};
    rows.push({
      id: s.id,
      name: c.name || '',
      position: c.position || '',
      image: c.image || null,
      votes: c.votes ?? 0
    });
  });
  rows.sort((a, b) => (a.position + a.name).localeCompare(b.position + b.name));

  rows.forEach(c => {
    const image = c.image || avatarDataUri(c.name);
    list.innerHTML += `
      <div class="border p-4 rounded text-center">
        <img src="${image}" class="w-20 h-20 sm:w-24 sm:h-24 mx-auto rounded-full object-cover">
        <h4 class="mt-2 font-semibold">${c.name}</h4>
        <p class="text-sm">${c.position}</p>
        <p class="text-sm text-gray-500">Votes: ${c.votes ?? 0}</p>
        <button onclick="deleteCandidate('${c.id}')" class="text-red-600 text-sm mt-2">Delete</button>
      </div>`;
  });
}

async function renderVoteRecords() {
  const body = document.getElementById('votesTableBody');
  body.innerHTML = '';
  const snap = await db.collection('votes').orderBy('createdAt', 'desc').limit(200).get();
  snap.forEach(s => {
    const v = s.data() || {};
    const matric = v.matric || '';
    const position = v.position || '';
    const votedFor = v.candidateName || v.candidateId || '';
    body.innerHTML += `
      <tr class="border-t">
        <td class="p-3 whitespace-nowrap">${matric}</td>
        <td class="p-3 whitespace-nowrap">${position}</td>
        <td class="p-3 whitespace-nowrap">${votedFor}</td>
      </tr>`;
  });
}

function formatTimestamp(ts) {
  try {
    if (!ts) return '';
    if (typeof ts.toDate === 'function') return ts.toDate().toLocaleString();
    return '';
  } catch {
    return '';
  }
}

async function renderRegisteredVoters() {
  const body = document.getElementById('votersTableBody');
  body.innerHTML = '';
  const snap = await db.collection('voters').orderBy('createdAt', 'desc').limit(200).get();
  snap.forEach(s => {
    const v = s.data() || {};
    const matric = v.matric || s.id || '';
    const status = v.completedAt ? 'COMPLETED' : 'ACTIVE';
    const completedAt = formatTimestamp(v.completedAt);
    body.innerHTML += `
      <tr class="border-t">
        <td class="p-3 whitespace-nowrap">${matric}</td>
        <td class="p-3 whitespace-nowrap">${status}</td>
        <td class="p-3 whitespace-nowrap">${completedAt}</td>
      </tr>`;
  });
}

(async () => {
  await ensureElectionDoc();
  renderPositionOptions();
  await renderCandidates();
  await renderVoteRecords();
  await renderRegisteredVoters();
})().catch(() => alert('Network error. Please refresh.'));
</script>

</body>
</html>
