<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MCIU Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: { extend: { colors: { primary:'#1e3a8a', secondary:'#f1f5f9' } } }
}
</script>
</head>

<body class="bg-secondary min-h-screen p-6">

<div class="bg-white max-w-5xl mx-auto rounded-xl shadow p-6">

<h1 class="text-2xl font-bold text-primary mb-4">Admin Dashboard</h1>

<p class="mb-4">
  Election Status:
  <span id="statusText" class="font-semibold"></span>
</p>

<div class="flex gap-4 mb-6">
  <button id="openBtn" class="bg-green-600 text-white px-4 py-2 rounded">Open Election</button>
  <button id="closeBtn" class="bg-red-600 text-white px-4 py-2 rounded">Close Election</button>
  <button id="resetBtn" class="bg-gray-700 text-white px-4 py-2 rounded">Reset Election</button>
</div>

<hr class="my-6">

<h2 class="text-xl font-semibold mb-4">Add Position</h2>

<div class="flex flex-col md:flex-row gap-4 mb-6">
  <input id="newPositionName" class="border p-2 rounded flex-1" placeholder="e.g. Treasurer">
  <button id="addPositionBtn" class="bg-primary text-white px-6 py-2 rounded">Add Position</button>
</div>

<hr class="my-6">

<h2 class="text-xl font-semibold mb-4">Add Candidate</h2>

<div class="grid md:grid-cols-3 gap-4 mb-6">
  <input id="candName" class="border p-2 rounded" placeholder="Candidate name">
  <select id="candPosition" class="border p-2 rounded">
  </select>
  <input id="candImage" type="file" accept="image/*" class="border p-2 rounded">
</div>

<button onclick="addCandidate()" class="bg-primary text-white px-6 py-2 rounded">
  Add Candidate
</button>

<hr class="my-6">

<h2 class="text-xl font-semibold mb-4">Candidates</h2>
<div id="candidateList" class="grid md:grid-cols-3 gap-6"></div>

</div>

<script type="module">
/* ========= ACCESS ========= */
const currentUser = JSON.parse(localStorage.getItem('currentUser'));
if (!currentUser || currentUser.role !== 'admin') {
  alert('Admins only');
  window.location.href = 'login.html';
}

/* ========= INIT ========= */
const defaultPositions = ['President', 'Vice President', 'Secretary General'];
if (!localStorage.getItem('electionData')) {
  localStorage.setItem('electionData', JSON.stringify({
    status: 'closed',
    positions: {
      President: [],
      'Vice President': [],
      'Secretary General': []
    }
  }));
} else {
  const existing = JSON.parse(localStorage.getItem('electionData'));
  if (!existing || typeof existing !== 'object') {
    localStorage.setItem('electionData', JSON.stringify({
      status: 'closed',
      positions: {
        President: [],
        'Vice President': [],
        'Secretary General': []
      }
    }));
  } else {
    if (existing.status !== 'active' && existing.status !== 'closed') existing.status = 'closed';
    if (!existing.positions || typeof existing.positions !== 'object') existing.positions = {};
    for (const p of defaultPositions) {
      if (!Object.prototype.hasOwnProperty.call(existing.positions, p)) existing.positions[p] = [];
    }
    localStorage.setItem('electionData', JSON.stringify(existing));
  }
}

const data = () => JSON.parse(localStorage.getItem('electionData'));
const save = d => localStorage.setItem('electionData', JSON.stringify(d));

const statusText = document.getElementById('statusText');

/* ========= STATUS ========= */
function renderStatus() {
  statusText.innerText = data().status === 'active' ? 'ACTIVE' : 'CLOSED';
  statusText.className = data().status === 'active' ? 'text-green-600' : 'text-red-600';
}
renderStatus();

/* ========= BUTTONS ========= */
openBtn.onclick = () => { const d = data(); d.status='active'; save(d); localStorage.setItem('electionStatus', 'active'); renderStatus(); };
closeBtn.onclick = () => { const d = data(); d.status='closed'; save(d); localStorage.setItem('electionStatus', 'closed'); renderStatus(); };

resetBtn.onclick = () => {
  if (!confirm('Reset election?')) return;
  const d = data();
  for (const pos in d.positions) d.positions[pos] = [];
  save(d);
  localStorage.removeItem('votes');
  renderCandidates();
};

/* ========= IMAGE ========= */
function toBase64(file, cb){
  const r = new FileReader();
  r.onload = () => cb(r.result);
  r.readAsDataURL(file);
}

function getInitials(name) {
  const parts = String(name || '')
    .trim()
    .split(/\s+/)
    .filter(Boolean);
  const first = parts[0]?.[0] ?? '';
  const last = parts.length > 1 ? parts[parts.length - 1]?.[0] ?? '' : '';
  return (first + last).toUpperCase() || 'U';
}

function hashToHue(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) hash = (hash * 31 + str.charCodeAt(i)) >>> 0;
  return hash % 360;
}

function avatarDataUri(name) {
  const initials = getInitials(name);
  const hue = hashToHue(String(name || 'User'));
  const bg = `hsl(${hue} 70% 45%)`;
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256"><rect width="256" height="256" rx="128" fill="${bg}"/><text x="50%" y="54%" dominant-baseline="middle" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="96" fill="#fff" font-weight="700">${initials}</text></svg>`;
  return `data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}`;
}

function getPositionKeys() {
  const d = data();
  if (!d.positions || typeof d.positions !== 'object') return [];
  return Object.keys(d.positions);
}

function renderPositionOptions() {
  const select = document.getElementById('candPosition');
  const keys = getPositionKeys();
  select.innerHTML = keys.map(p => `<option value="${p}">${p}</option>`).join('');
}

addPositionBtn.onclick = () => {
  const name = newPositionName.value.trim().replace(/\s+/g, ' ');
  if (!name) return alert('Enter position name');

  const d = data();
  if (!d.positions || typeof d.positions !== 'object') d.positions = {};

  const exists = Object.keys(d.positions).some(p => p.toLowerCase() === name.toLowerCase());
  if (exists) return alert('Position already exists');

  d.positions[name] = [];
  save(d);
  newPositionName.value = '';
  renderPositionOptions();
};

/* ========= ADD ========= */
window.addCandidate = () => {
  const name = candName.value.trim();
  const file = candImage.files?.[0];
  const position = candPosition.value;

  if (!name) return alert('Enter candidate name');
  if (!position) return alert('Select position');

  const addWithImage = (img) => {
    const d = data();
    if (!d.positions || typeof d.positions !== 'object') d.positions = {};
    if (!d.positions[position]) d.positions[position] = [];
    d.positions[position].push({
      id: Date.now(),
      name,
      image: img || avatarDataUri(name),
      votes: 0
    });
    save(d);
    candName.value = '';
    candImage.value = '';
    renderCandidates();
  };

  if (file) {
    toBase64(file, addWithImage);
    return;
  }

  addWithImage(null);
};

/* ========= DELETE ========= */
window.deleteCandidate = (pos, id) => {
  const d = data();
  d.positions[pos] = d.positions[pos].filter(c => c.id !== id);
  save(d);
  renderCandidates();
};

/* ========= RENDER ========= */
function renderCandidates(){
  const list = document.getElementById('candidateList');
  list.innerHTML = '';
  const d = data();
  for (const pos in d.positions) {
    d.positions[pos].forEach(c => {
      const image = c.image || avatarDataUri(c.name);
      list.innerHTML += `
        <div class="border p-4 rounded text-center">
          <img src="${image}" class="w-24 h-24 mx-auto rounded-full object-cover">
          <h4 class="mt-2 font-semibold">${c.name}</h4>
          <p class="text-sm">${pos}</p>
          <p class="text-sm text-gray-500">Votes: ${c.votes ?? 0}</p>
          <button onclick="deleteCandidate('${pos}', ${c.id})"
            class="text-red-600 text-sm mt-2">Delete</button>
        </div>`;
    });
  }
}
renderCandidates();
renderPositionOptions();
</script>

</body>
</html>
